<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>宝宝英语乐园</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div id="app">
        <!-- 开场页 -->
        <section id="intro-page" class="page active">
            <div class="intro-content">
                <div class="logo-emoji">🌈</div>
                <h1 class="title">宝宝英语乐园</h1>
                <p class="subtitle">52周英语启蒙计划</p>
                <button class="btn btn-start" onclick="goToPlan()">开始学习</button>
                <p class="tip">每天学一个单词，轻松启蒙</p>
            </div>
        </section>

        <!-- 学习计划页 -->
        <section id="plan-page" class="page">
            <div class="header">
                <button class="btn-back" onclick="goToIntro()">返回</button>
                <h2>第 <span id="plan-week-num">1</span> 周</h2>
                <div class="week-nav">
                    <button class="btn-nav" onclick="prevWeek()">◀</button>
                    <button class="btn-nav" onclick="nextWeek()">▶</button>
                </div>
            </div>
            <div class="days-grid" id="days-grid">
                <!-- 动态生成 -->
            </div>
            <div id="exam-entry-container" style="text-align:center;margin-top:20px;"></div>
            <div class="plan-progress">
                <div class="progress-bar plan-bar">
                    <div class="progress-fill" id="plan-progress-fill"></div>
                </div>
                <div class="plan-progress-text">已学 <span id="learned-count">0</span> / 260 天</div>
            </div>
        </section>

        <!-- 学习页 -->
        <section id="learn-page" class="page">
            <div class="header">
                <button class="btn-back" onclick="quitDay()">返回</button>
                <div class="day-title">第 <span id="learn-week-num">1</span> 周 <span id="learn-day-name">周一</span></div>
            </div>
            <div class="game-content">
                <div class="word-card" id="word-card">
                    <div class="word-emoji" id="word-emoji">🐱</div>
                    <div class="word-english" id="word-english">cat</div>
                    <div class="word-chinese" id="word-chinese">小猫</div>
                </div>
                <div class="action-buttons">
                    <button class="btn btn-listen" onclick="playWord()">
                        <span class="btn-icon">🔊</span>
                        <span>听发音</span>
                    </button>
                    <button class="btn btn-speak" id="btn-speak" onclick="startSpeak()">
                        <span class="btn-icon" id="speak-icon">⭐</span>
                        <span id="speak-text">学会了</span>
                    </button>
                </div>
                <div class="hint-text" id="hint-text">点击"听发音"听一遍，然后点击"学会了"</div>
            </div>
        </section>

        <!-- 考试页 -->
        <section id="exam-page" class="page">
            <div class="header">
                <button class="btn-back" onclick="quitExam()">返回</button>
                <div class="day-title">第 <span id="exam-week-num">1</span> 周 小考试</div>
            </div>
            <div class="game-content">
                <div class="hint-text" id="exam-hint">👂 听听是什么？</div>
                <button class="btn btn-listen" onclick="playExamWord()" style="margin-bottom:10px;">
                    <span class="btn-icon">🔊</span>
                    <span>再听一遍</span>
                </button>
                <div class="exam-options" id="exam-options">
                    <!-- 动态生成 -->
                </div>
                <div class="exam-progress" id="exam-progress">
                    <!-- 动态生成 -->
                </div>
            </div>
        </section>

        <!-- 完成页 -->
        <section id="complete-page" class="page">
            <div class="result-content">
                <div class="result-emoji">🎉</div>
                <h2 class="result-title" id="complete-title">今日学习完成！</h2>
                <div class="result-stars">
                    <div class="big-star" id="complete-star">⭐</div>
                </div>
                <p class="result-text" id="complete-text">宝宝真棒！明天见！</p>
                <div class="result-buttons">
                    <button class="btn btn-menu" onclick="goToPlan()">返回计划</button>
                </div>
            </div>
        </section>

        <!-- 共用反馈弹窗 -->
        <div class="feedback-overlay" id="feedback-overlay">
            <div class="feedback-content" id="feedback-content">
                <div class="feedback-emoji" id="feedback-emoji">⭐</div>
                <div class="feedback-text" id="feedback-text">太棒了！</div>
            </div>
        </div>
    </div>

    <script src="js/app.js"></script>
</body>
</html>
